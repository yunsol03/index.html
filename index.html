<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>윤회의 길</title>

<style>
body {
  margin: 0;
  font-family: "맑은 고딕", serif;

  background-image: url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;

  color: #f5f1e6;
  text-align: center;
}

#container {
  width: 520px;
  margin: 100px auto;
  padding: 50px 40px;

  background: rgba(20,20,20,0.7);
  backdrop-filter: blur(8px);

  border-radius: 10px;
  box-shadow: 0 0 60px rgba(0,0,0,0.9);
  position: relative;
}

#container::before {
  content: '';
  position: absolute;
  top: -120px;
  left: 50%;
  transform: translateX(-50%);
  width: 260px;
  height: 260px;
  background: radial-gradient(circle, rgba(212,175,55,0.25), transparent);
  filter: blur(50px);
}

h1 {
  font-weight: normal;
  letter-spacing: 6px;
  color: #d4af37;
}

.symbol {
  font-size: 26px;
}

#story {
  font-size: 17px;
  line-height: 2.2;
  margin: 50px 0;
  white-space: pre-line;
}

button {
  display: block;
  width: 75%;
  margin: 10px auto;
  padding: 14px;
  border: 1px solid rgba(255,255,255,0.3);
  background: transparent;
  color: #ddd;
  font-size: 15px;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  border-color: #d4af37;
  color: #fff;
  background: rgba(255,255,255,0.05);
}

.result {
  font-size: 24px;
  color: #d4af37;
}
</style>

</head>

<body>

<div id="container">

<div class="symbol">☸ 🧘 ☸</div>
<h1>윤회의 길</h1>

<p id="story"></p>

<button id="btn1">시작하기</button>
<button id="btn2" style="display:none;"></button>

</div>

<script>
let step = -1;
let karma = 0;

const story = document.getElementById("story");
const btn1 = document.getElementById("btn1");
const btn2 = document.getElementById("btn2");

function typeText(text){
  let i = 0;
  story.innerHTML = "";
  let interval = setInterval(()=>{
    story.innerHTML += text[i];
    i++;
    if(i >= text.length) clearInterval(interval);
  }, 18);
}

/* ✅ 🔥 선택 순서 섞기 적용 */
const questions = [

{
q: "시험을 보고 있는 상황이다.\n아무도 모르는 방법으로 점수를 올릴 수 있다.\n\n이 선택을 마주했을 때 마음은 어디로 기울어지는가?",
a: ["정직하게 본다", "조금쯤은 괜찮다고 생각한다"]
},

{
q: "길에서 곤란해 보이는 사람을 만났다.\n도울 수는 있지만, 내 일정이 밀릴 수도 있다.\n\n이 상황에서 어떤 선택을 하는가?",
a: ["어쩔 수 없다고 생각하고 지나간다", "잠시 시간을 내어 돕는다"]  // ✅ 뒤집힘
},

{
q: "친구가 잘못된 선택을 하고 있다.\n말해주면 관계가 어색해질 수도 있다.\n\n지금 당신에게 더 크게 다가오는 것은 무엇인가?",
a: ["불편하더라도 솔직하게 말한다", "괜히 상황을 만들고 싶지 않아 넘어간다"]
},

{
q: "어떤 일에 실패했다.\n계속 떠오르고 마음이 놓이지 않는다.\n\n이 감정을 어떻게 대하는가?",
a: ["계속 생각하며 붙잡는다", "그대로 인정하고 내려놓는다"] // ✅ 뒤집힘
},

{
q: "누군가의 말이 마음을 건드렸다.\n화가 올라오는 걸 느낀다.\n\n이 감정을 마주했을 때 어떻게 행동하는가?",
a: ["그 감정을 그대로 드러낸다", "잠시 멈추고 스스로를 바라본다"] // ✅ 뒤집힘
},

{
q: "더 많은 것을 가질 기회가 눈앞에 있다.\n지금도 충분하지만 더 욕심이 난다.\n\n이때 어떤 선택을 하는가?",
a: ["조금 더 가지려고 한다", "지금으로 충분하다고 생각한다"] // ✅ 뒤집힘
},

{
q: "문득 ‘나는 어떤 사람인가’라는 생각이 든다.\n그 질문이 계속 머릿속에 맴돈다.\n\n이 생각을 어떻게 대하는가?",
a: ["스스로를 계속 정의하려 한다", "그 생각조차 지나가도록 둔다"] // ✅ 뒤집힘
}

];

function showQuestion(){
  let q = questions[step];
  typeText(q.q);
  btn1.innerText = q.a[0];
  btn2.innerText = q.a[1];
  btn2.style.display = "block";
}

typeText("잠시 멈춰 서서 숨을 고릅니다.\n\n당신의 선택은 어떤 흐름을 만들어왔을까요?");

btn1.onclick = () => {
  if(step === -1){
    step = 0;
    showQuestion();
    return;
  }
  handleChoice(1);
};

btn2.onclick = () => handleChoice(2);

function handleChoice(choice){

  /* ✅ 섞인 구조 대응 */
  if(
    (step === 1 && choice === 2) ||
    (step === 3 && choice === 2) ||
    (step === 4 && choice === 2) ||
    (step === 5 && choice === 2) ||
    (step === 6 && choice === 2)
  ){
    karma++;
  } else if(
    (step === 0 && choice === 1) ||
    (step === 2 && choice === 1)
  ){
    karma++;
  } else {
    karma--;
  }

  step++;

  if(step < questions.length){
    showQuestion();
  } else {
    ending();
  }
}

function ending(){

  let result, msg;

  if(karma >= 4){
    result = "해탈";
    msg = "당신은 상황보다 마음을 더 깊이 바라보았습니다.\n\n집착을 내려놓으려는 태도 속에서 자유에 가까워졌습니다.";
  }
  else if(karma >= 1){
    result = "인간";
    msg = "여러 상황 속에서 고민하며 선택했습니다.";
  }
  else if(karma >= -2){
    result = "동물";
    msg = "상황에 따라 자연스럽게 반응하고 있습니다.";
  }
  else{
    result = "고통";
    msg = "집착에 흔들리는 선택이 반복되었습니다.";
  }

  typeText("[" + result + "]\n\n" + msg);

  btn1.style.display = "none";
  btn2.style.display = "none";
}
</script>

</body>
</html>
